<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --border: #1e2330;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --accent3: #a87ec9;
    --text: #e8e4dc;
    --muted: #6b7180;
    --tag-bg: #1a1e28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    padding: 60px 48px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  .filter-bar {
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-right: 8px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  main {
    padding: 0 48px 80px;
    position: relative;
    z-index: 1;
  }

  .section {
    margin-top: 56px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }

  .section-arrow {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .section-subtitle {
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .resources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .resource-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 22px;
    transition: all 0.25s ease;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .resource-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .resource-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .resource-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .card-title a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }
  .card-title a:hover { color: var(--card-accent, var(--accent)); }

  .type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .type-book    { background: #2a1f0a; color: #c8a96e; border: 1px solid #3a2f1a; }
  .type-video   { background: #0a1f2a; color: #7eb8c9; border: 1px solid #1a3040; }
  .type-course  { background: #1a0a2a; color: #a87ec9; border: 1px solid #2a1a3a; }
  .type-paper   { background: #0a2a1a; color: #7ec9a8; border: 1px solid #1a3a2a; }
  .type-tool    { background: #2a0a0a; color: #c97e7e; border: 1px solid #3a1a1a; }
  .type-article { background: #1a1f0a; color: #b0c97e; border: 1px solid #2a2f1a; }

  .card-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
    font-style: italic;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 2px;
  }

  .difficulty {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--card-accent, var(--accent)); }

  .free-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #7ec9a8;
    background: #0a2a1a;
    border: 1px solid #1a3a2a;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .section.hidden { display: none; }

  footer {
    border-top: 1px solid var(--border);
    padding: 32px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

    width: 32px;
    height: 32px;
    border-radius: 50%;
    opacity: 0.8;
  }

  footer span {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    transition: color 0.2s;
  }

  footer a:hover span { color: var(--accent); }
  footer a:hover img { opacity: 1; }

  @media (max-width: 700px) {
    footer { padding-left: 20px; padding-right: 20px; }
  }

  .lang-toggle {
    position: absolute;
    top: 24px;
    right: 48px;
    display: flex;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  .lang-toggle a, .lang-toggle span {
    padding: 5px 10px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--muted);
    transition: all 0.2s;
  }

  .lang-toggle a:first-child, .lang-toggle span:first-child {
    border-radius: 2px 0 0 2px;
  }

  .lang-toggle a:last-child, .lang-toggle span:last-child {
    border-radius: 0 2px 2px 0;
    margin-left: -1px;
  }

  .lang-toggle a:hover { border-color: var(--accent); color: var(--accent); }
  .lang-toggle .active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  @media (max-width: 700px) {
    header, .filter-bar, main { padding-left: 20px; padding-right: 20px; }
    .resources-grid { grid-template-columns: 1fr; }
    .lang-toggle { top: 16px; right: 20px; }
  }
</style>
</head>

function getDots(level, accent) {
  let html = '<div class="difficulty">';
  for (let i = 1; i <= 4; i++) {
    html += `<div class="dot ${i <= level ? 'filled' : ''}" style="${i <= level ? `background:${accent}` : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function getTypeBadge(type) {
  const labels = { book:'Libro', video:'Video', course:'Curso', paper:'Paper', tool:'Tool', article:'Artículo' };
  return `<span class="type-badge type-${type}">${labels[type] || type}</span>`;
}

function render(activeFilter = 'all') {
  const main = document.getElementById('main');
  main.innerHTML = '';

  sections.forEach((sec, si) => {
    const filtered = activeFilter === 'all'
      ? sec.resources
      : sec.resources.filter(r => r.type === activeFilter);
    if (filtered.length === 0) return;

    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = `${si * 0.05}s`;

    const cards = filtered.map(r => `
      <div class="resource-card" style="--card-accent: ${sec.accent}">
        <div class="card-top">
          <div class="card-title">
            ${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>` : r.title}
          </div>
          ${getTypeBadge(r.type)}
        </div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-tags">
          ${getDots(r.difficulty, sec.accent)}
          ${r.free ? '<span class="free-badge">GRATIS</span>' : ''}
          ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');

    div.innerHTML = `
      <div class="section-header">
        <span class="section-number" style="color:${sec.accent}">${sec.number}</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-subtitle">— ${sec.subtitle}</span>
      </div>
      <div class="resources-grid">${cards}</div>
    `;

    main.appendChild(div);
  });
}

function filter(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render(type);
}
