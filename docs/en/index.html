  body {

  }

  header {

    position: relative;
    z-index: 1;
  }

    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

    gap: 8px;

    align-items: center;
    position: relative;
    z-index: 1;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-right: 8px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 2px;

    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;

  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  main {
    padding: 0 48px 80px;
    position: relative;
    z-index: 1;
  }

  .section {
    margin-top: 56px;

  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }

    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);

  .section-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }

  .section-arrow {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .section-subtitle {
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .resources-grid {

  .resource-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 22px;
    transition: all 0.25s ease;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .resource-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .resource-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

    color: inherit;
    text-decoration: none;
    transition: color 0.2s;

    font-size: 9px;

    font-size: 14px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
    font-style: italic;

    display: flex;
    flex-wrap: wrap;
    gap: 6px;

    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);

    padding: 2px 8px;
    border-radius: 2px;

    gap: 3px;
    align-items: center;

    border-radius: 50%;
    background: var(--border);

    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #7ec9a8;
    background: #0a2a1a;

    right: 48px;

    font-size: 11px;
    letter-spacing: 0.1em;

function getDots(level, accent) {
  let html = '<div class="difficulty">';
  for (let i = 1; i <= 4; i++) {
    html += `<div class="dot ${i <= level ? 'filled' : ''}" style="${i <= level ? `background:${accent}` : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function getTypeBadge(type) {
  const labels = { book:'Book', video:'Video', course:'Course', paper:'Paper', tool:'Tool', article:'Article' };
  return `<span class="type-badge type-${type}">${labels[type] || type}</span>`;
}

function render(activeFilter = 'all') {
  const main = document.getElementById('main');
  main.innerHTML = '';

  sections.forEach((sec, si) => {
    const filtered = activeFilter === 'all'
      ? sec.resources
      : sec.resources.filter(r => r.type === activeFilter);
    if (filtered.length === 0) return;

    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = `${si * 0.05}s`;

    const cards = filtered.map(r => `
      <div class="resource-card" style="--card-accent: ${sec.accent}">
        <div class="card-top">
          <div class="card-title">
            ${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>` : r.title}
          </div>
          ${getTypeBadge(r.type)}
        </div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-tags">
          ${getDots(r.difficulty, sec.accent)}
          ${r.free ? '<span class="free-badge">FREE</span>' : ''}
          ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');

    div.innerHTML = `
      <div class="section-header">
        <span class="section-number" style="color:${sec.accent}">${sec.number}</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-subtitle">— ${sec.subtitle}</span>
      </div>
      <div class="resources-grid">${cards}</div>
    `;

    main.appendChild(div);
  });
}

function filter(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render(type);
}

render();
